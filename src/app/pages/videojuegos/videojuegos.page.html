<ion-header>
  <ion-toolbar class="toolbar-custom">
    <ion-title class="title-custom">VideoGames Store</ion-title>
    <ion-button slot="end" class="btn-logout" (click)="logout()">
      Cerrar Sesión
    </ion-button>
  </ion-toolbar>
</ion-header>

<ion-content class="content-custom">

  <ion-loading [isOpen]="isLoading" message="Cargando videojuegos..."></ion-loading>

  <ion-alert
    [isOpen]="!!errorMessage"
    header="Error"
    [message]="errorMessage"
    buttons="['OK']"
    (didDismiss)="errorMessage = ''">
  </ion-alert>

  <div class="lista-container" *ngIf="!isLoading">

    <ion-card class="juego-card" *ngFor="let juego of videojuegos">

      <!-- Cabecera con imagen pequeña y título -->
      <div style="display: flex; align-items: center; gap: 12px; padding: 12px;">
        <div *ngIf="juego.imagen_url" style="width: 120px; flex-shrink: 0; border-radius: 6px; overflow: hidden;">
          <img [src]="juego.imagen_url" style="width: 100%; height: auto; display: block;" />
        </div>
        
        <!-- Título y subtítulo junto a la imagen -->
        <div style="flex: 1;">
          <h2 style="margin: 0 0 4px 0; font-size: 18px; font-weight: bold;">{{ juego.titulo }}</h2>
          <p style="margin: 0; font-size: 12px; color: #666;">
            {{ juego.plataforma }} • {{ juego.categoria || 'Sin categoría' }}
          </p>
        </div>
      </div>

      <!-- Video (si existe) -->
      <div *ngIf="juego.video_url" class="video-container">
        <iframe
          [src]="juego.video_url | safeUrl"
          frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen>
        </iframe>
      </div>

      <!-- Reproductor de audio (si existe) -->
      <div *ngIf="juego.audio_url" class="audio-container">
        <audio controls [src]="juego.audio_url" class="audio-player"></audio>
      </div>

      <!-- Información de precio y stock -->
      <ion-card-content class="card-content-custom">
        <p class="dato-precio">💲 Precio: <strong>${{ juego.precio }}</strong></p>
        <p class="dato-stock">📦 Stock: <strong>{{ juego.stock }}</strong></p>
      </ion-card-content>

      <!-- Botones de acción -->
      <div class="acciones-custom">
        <ion-button class="btn-editar" [routerLink]="['/videojuegos-form', juego.id]">
          Editar
        </ion-button>
        <ion-button class="btn-eliminar" (click)="eliminar(juego.id!)">
          Eliminar
        </ion-button>
      </div>
    </ion-card>

    <!-- Mensaje cuando no hay videojuegos -->
    <ion-card *ngIf="videojuegos.length === 0" class="card-vacio">
      <ion-card-content class="no-data">
        No hay videojuegos disponibles
      </ion-card-content>
    </ion-card>

  </div>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button class="fab-custom" routerLink="/videojuegos-form">
      +
    </ion-fab-button>
  </ion-fab>

</ion-content>
